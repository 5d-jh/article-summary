<!DOCTYPE html>
<html>

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MyGist Settings</title>
    <link rel="stylesheet" href="styles.css">
    <style>
        body {
            max-width: 600px;
            margin: 0 auto;
            padding: 40px 20px;
        }
    </style>
</head>

<body>
    <h2>MyGist Settings</h2>
    <form id="options-form">
        <label>
            LM Studio Host (e.g. http://127.0.0.1:1234):
            <input type="text" id="host" placeholder="http://127.0.0.1:1234">
        </label>
        <label>
            Model:
            <select id="model">
                <option value="" disabled selected>Loading models...</option>
            </select>
        </label>

        <button type="submit">Save</button>
        <div id="status" class="status"></div>
    </form>
    <script src="options.js"></script>
</body>

</html>
